<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon API Produits - Ahmed Chokri</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .product-card { border: 1px solid #ccc; padding: 10px; margin: 10px 0; border-radius: 5px; }
        h1 { color: #2c3e50; }
    </style>
</head>
<body>
    <h1>Liste des Produits</h1>
    <div id="products-list">Chargement des produits...</div>

    <script>
        // Appel à ton API locale
        fetch('http://localhost:5000/products')
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('products-list');
                list.innerHTML = ''; // On vide le message de chargement

                data.forEach(product => {
                    const div = document.createElement('div');
                    div.className = 'product-card';
                 div.innerHTML = `
    <strong>${product.name}</strong> - ${product.price}$ <br>
    Catégorie: ${product.category} | Quantité: ${product.quantity}
`;
                    list.appendChild(div);
                });
            })
            .catch(error => {
                console.error('Erreur:', error);
                document.getElementById('products-list').innerHTML = "Erreur de connexion à l'API.";
            });
    </script>
</body>
</html>
